<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Anisa, do you love me?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Dancing+Script:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;}
:root{
  --pink:#ff3399;
  --pink-soft:#ffccff;
  --pink-pale:#ffe0f0;
  --cyan:#00ffff;
  --white:#ffffff;
  --black:#000000;
  --glow-pink:0 0 6px #ff3399,0 0 20px #ff3399,0 0 50px rgba(255,51,153,0.4);
}
html,body{
  margin:0;padding:0;
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Press Start 2P',monospace;
}

/* ── SCANLINES ── */
#scanlines{
  position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 2px,
    rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px
  );
}

/* ── STARFIELD ── */
#stars{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.star{
  position:absolute;
  background:#fff;
  border-radius:50%;
  animation:twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}

/* ── MATRIX RAIN ── */
#rain{
  position:fixed;inset:0;overflow:hidden;z-index:1;
  opacity:0;transition:opacity 1.2s;
  display:flex;justify-content:space-between;pointer-events:none;
}
.rc{display:flex;flex-direction:column;white-space:nowrap;font-size:11px;line-height:1.7;color:rgba(255,51,153,0.35);user-select:none;}
.rm{animation:scrollDown 10s linear infinite;}
.rc:nth-child(even) .rm{animation-duration:7s;}
.rc:nth-child(3n) .rm{animation-duration:13s;}
@keyframes scrollDown{0%{transform:translateY(-50%);}100%{transform:translateY(0);}}

/* ── FLOATING PHOTOS (SCATTERED POLAROIDS) ── */
#photo-bg{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.polaroid{
  position:absolute;
  background:#fff;
  padding:8px 8px 28px;
  box-shadow:4px 4px 16px rgba(0,0,0,0.6);
  animation:floatPol var(--fdur,20s) ease-in-out infinite var(--fdel,0s);
  opacity:0.82;
}
.polaroid img,.polaroid .pol-inner{
  width:100%;display:block;
  background:linear-gradient(135deg,var(--c1,#ffb6c1),var(--c2,#ff69b4));
  aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.pol-label{font-family:'Dancing Script',cursive;font-size:11px;color:#333;text-align:center;margin-top:4px;line-height:1.3;}
@keyframes floatPol{
  0%,100%{transform:rotate(var(--rot,3deg)) translateY(0px);}
  33%{transform:rotate(calc(var(--rot,3deg) + 2deg)) translateY(-10px);}
  66%{transform:rotate(calc(var(--rot,3deg) - 2deg)) translateY(6px);}
}

/* ── HEART-SHAPED PHOTO FRAMES ── */
.heart-photo-wrap{
  position:absolute;
  animation:floatHeart var(--fdur,18s) ease-in-out infinite var(--fdel,0s);
  filter:drop-shadow(0 0 10px rgba(255,51,153,0.5));
}
@keyframes floatHeart{
  0%,100%{transform:scale(1) translateY(0) rotate(var(--rot,0deg));}
  50%{transform:scale(1.04) translateY(-14px) rotate(var(--rot,0deg));}
}
.heart-photo-wrap svg{display:block;}
.heart-photo-wrap image{clip-path:url(#heart-clip);}

/* ── PIXEL WINDOW ── */
#canvas{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;}
#win{
  position:relative;
  background:rgba(0,0,0,0.88);
  backdrop-filter:blur(8px);
  border:3px solid rgba(255,255,255,0.9);
  width:440px;max-width:92vw;
  box-shadow:0 0 0 1px #000,6px 6px 0 #1a0010,0 0 60px rgba(255,51,153,0.25),inset 0 0 30px rgba(255,51,153,0.03);
  animation:winIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes winIn{from{opacity:0;transform:scale(0.85) translateY(24px);}to{opacity:1;transform:scale(1) translateY(0);}}

/* window bar */
.wbar{background:#0d0006;border-bottom:3px solid rgba(255,255,255,0.9);padding:8px 14px;display:flex;align-items:center;gap:8px;}
.wdot{width:10px;height:10px;border:2px solid #fff;display:inline-block;}
.wdot:nth-child(1){border-color:#ff3399;background:rgba(255,51,153,0.2);}
.wdot:nth-child(2){border-color:#ffcc00;background:rgba(255,204,0,0.1);}
.wdot:nth-child(3){border-color:#00ff88;background:rgba(0,255,136,0.1);}
.wtitle{font-size:6px;color:#666;margin-left:auto;letter-spacing:2px;}

.wbody{padding:36px 28px 32px;text-align:center;}

/* ── GLITCH TITLE ── */
.glitch-wrap{position:relative;margin-bottom:10px;display:inline-block;}
.glitch{
  font-size:11px;color:#fff;line-height:2;position:relative;
  text-shadow:0 0 10px rgba(255,255,255,0.25);
}
.glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;}
.glitch::before{color:#ff3399;animation:glitch1 3.5s infinite;clip-path:polygon(0 0,100% 0,100% 38%,0 38%);}
.glitch::after{color:#00ffff;animation:glitch2 3.5s infinite;clip-path:polygon(0 62%,100% 62%,100% 100%,0 100%);}
@keyframes glitch1{0%,88%,100%{transform:translate(0);}89%{transform:translate(-4px,1px);}91%{transform:translate(4px,-1px);}93%{transform:translate(-2px,0);}}
@keyframes glitch2{0%,88%,100%{transform:translate(0);}90%{transform:translate(4px,1px);}92%{transform:translate(-4px,-1px);}94%{transform:translate(2px,0);}}

.cursor{display:inline-block;width:9px;height:14px;background:#fff;margin-left:4px;vertical-align:middle;animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* subtitle */
.subtitle{font-family:'Dancing Script',cursive;font-size:15px;color:rgba(255,204,255,0.55);margin-bottom:36px;letter-spacing:1px;}

/* ── BUTTONS ── */
.btns{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.pbtn{
  background:transparent;color:#fff;
  border:3px solid #fff;padding:13px 30px;font-size:9px;
  cursor:pointer;font-family:'Press Start 2P',monospace;
  position:relative;overflow:hidden;transition:color 0.15s;letter-spacing:1px;
}
.pbtn::before{content:'';position:absolute;inset:0;background:#fff;transform:translateX(-101%);transition:transform 0.2s ease;z-index:-1;}
.pbtn:hover::before{transform:translateX(0);}
.pbtn:hover{color:#000;}
.pbtn:active{transform:translate(2px,2px);}
.pbtn-yes{border-color:#ff3399;}
.pbtn-yes::before{background:#ff3399;}
.pbtn-yes:hover{color:#fff;}
.pbtn-no{border-color:#555;color:#888;}
.pbtn-no::before{background:#333;}
.pbtn-no:hover{color:#ccc;}

/* ── HP BAR ── */
#hpbar-wrap{margin-top:24px;display:none;}
.hplabel{font-size:6px;color:#666;margin-bottom:6px;letter-spacing:2px;}
#hpbar{width:100%;height:12px;background:#0d0006;border:2px solid #333;position:relative;overflow:hidden;}
#hpfill{height:100%;width:100%;background:linear-gradient(90deg,#ff3399,#ff69b4);transition:width 0.15s linear;box-shadow:0 0 10px #ff3399;}

/* ── STATUS ── */
#status{font-size:6px;color:#555;margin-top:10px;min-height:12px;letter-spacing:1px;}

/* ── YES SCREEN ── */
#yes-screen{
  position:fixed;inset:0;z-index:50;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#1a0010 0%,#000 70%);
  animation:fadeIn 0.5s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
#hearts-canvas{position:fixed;inset:0;pointer-events:none;z-index:51;}

.yes-box{position:relative;z-index:52;text-align:center;animation:floatUp 0.8s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes floatUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

/* big heart icon on YES screen */
.yes-heart-icon{
  display:block;margin:0 auto 20px;
  width:90px;height:90px;
  animation:heartbeat 1.3s ease-in-out infinite;
  filter:drop-shadow(0 0 10px #ff3399) drop-shadow(0 0 30px rgba(255,51,153,0.5));
}
@keyframes heartbeat{0%,100%{transform:scale(1);}15%{transform:scale(1.18);}30%{transform:scale(1);}45%{transform:scale(1.12);}70%{transform:scale(1);}}

.yes-msg{font-size:12px;color:#fff;line-height:2.2;margin-bottom:4px;text-shadow:0 0 20px rgba(255,255,255,0.4);}
.yes-sub-romantic{font-family:'Dancing Script',cursive;font-size:20px;color:#ff3399;text-shadow:var(--glow-pink);margin-top:12px;animation:pulseGlow 2s ease-in-out infinite;}
@keyframes pulseGlow{0%,100%{text-shadow:0 0 6px #ff3399,0 0 20px #ff3399;}50%{text-shadow:0 0 10px #ff3399,0 0 40px #ff3399,0 0 80px rgba(255,51,153,0.4);}}
.yes-saved{font-size:6px;color:#ff69b4;letter-spacing:2px;margin-top:20px;display:none;animation:fadeIn 0.5s ease;}

/* polaroid gallery in YES screen */
#yes-gallery{
  display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;justify-content:center;
  max-width:520px;
}
.yes-pol{
  background:#fff;padding:6px 6px 22px;
  box-shadow:3px 3px 12px rgba(0,0,0,0.7);
  animation:polDropIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  transform:rotate(var(--pr,2deg));
}
.yes-pol .pol-img{
  width:90px;height:90px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.yes-pol .pol-img img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center 20%;
  display:block;
}
.yes-pol .pol-caption{font-family:'Dancing Script',cursive;font-size:10px;color:#444;text-align:center;margin-top:3px;}
@keyframes polDropIn{from{opacity:0;transform:rotate(var(--pr,2deg)) translateY(-20px);}to{opacity:1;transform:rotate(var(--pr,2deg)) translateY(0);}}

/* ── NO SCREEN ── */
#no-screen{
  position:fixed;inset:0;z-index:40;
  background:radial-gradient(ellipse at center,#1a0010 0%,#000 70%);
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
.neon-center{position:relative;z-index:45;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;}
.neon-big{
  font-size:18px;color:#ffccff;line-height:1.9;
  text-shadow:0 0 5px #ffccff,0 0 20px #ff3399,0 0 50px #ff3399;
  animation:neonFlicker 4s infinite;
}
@keyframes neonFlicker{
  0%,19%,21%,23%,25%,54%,56%,100%{text-shadow:0 0 5px #ffccff,0 0 20px #ff3399,0 0 50px #ff3399;}
  20%,22%,24%,55%{text-shadow:none;color:#440022;}
}
.neon-heart-svg{
  width:110px;height:110px;
  filter:drop-shadow(0 0 6px #ffccff) drop-shadow(0 0 20px #ff3399) drop-shadow(0 0 50px #ff3399);
  animation:heartbeat 1.2s ease-in-out infinite;
}
.neon-sub{font-size:7px;color:#ff3399;letter-spacing:3px;text-shadow:0 0 10px #ff3399;animation:neonFlicker 6s 1s infinite;}
.retry-btn{
  margin-top:20px;background:transparent;border:2px solid #ff3399;color:#ff3399;
  font-family:'Press Start 2P',monospace;font-size:7px;padding:12px 18px;cursor:pointer;
  letter-spacing:2px;text-shadow:0 0 8px #ff3399;box-shadow:0 0 14px rgba(255,51,153,0.3);transition:all 0.2s;
}
.retry-btn:hover{background:#ff3399;color:#000;box-shadow:0 0 28px rgba(255,51,153,0.8);}

/* ── TYPEWRITER ── */
.tw{overflow:hidden;white-space:nowrap;}

/* ── MUSIC NOTE FLOAT ── */
.music-note{
  position:fixed;z-index:3;pointer-events:none;
  font-size:16px;opacity:0;
  animation:noteFloat 3s ease-out forwards;
}
@keyframes noteFloat{0%{opacity:0.8;transform:translateY(0) rotate(-10deg);}100%{opacity:0;transform:translateY(-80px) rotate(20deg);}}
</style>
</head>
<body>

<div id="scanlines"></div>
<div id="stars"></div>
<div id="rain"></div>
<div id="photo-bg"></div>

<!-- SVG defs for heart clip -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <clipPath id="heart-clip" clipPathUnits="objectBoundingBox">
      <path d="M0.5,0.9 L0.07,0.48 C-0.05,0.32 -0.02,0.1 0.15,0.04 C0.28,-0.01 0.42,0.05 0.5,0.18 C0.58,0.05 0.72,-0.01 0.85,0.04 C1.02,0.1 1.05,0.32 0.93,0.48 Z"/>
    </clipPath>
  </defs>
</svg>

<div id="canvas">
  <div id="win">
    <div class="wbar">
      <span class="wdot"></span>
      <span class="wdot"></span>
      <span class="wdot"></span>
      <span class="wtitle">SYSTEM://HEART.EXE v2.0</span>
    </div>
    <div class="wbody">
      <div class="glitch-wrap">
        <div class="glitch" data-text="Anisa, do you love me?">Anisa, do you love me?<span class="cursor"></span></div>

      <div class="btns">

</div>

<!-- YES SCREEN -->
<div id="yes-screen">
  <canvas id="hearts-canvas"></canvas>

    <svg class="yes-heart-icon" viewBox="0 0 100 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 85 L10 45 C-2 30 1 8 18 2 C30 -2 42 5 50 18 C58 5 70 -2 82 2 C99 8 102 30 90 45 Z" fill="url(#hgrad)"/>
      <defs>
        <linearGradient id="hgrad" x1="0" y1="0" x2="100" y2="90" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ff3399"/>

        </linearGradient>
      </defs>
    </svg>
    <div class="yes-msg tw" id="yes-line1"></div>
    <div class="yes-msg tw" id="yes-line2" style="color:#ff3399;font-size:9px;"></div>
    <div class="yes-sub-romantic" id="yes-romantic" style="display:none;">i love you more than pixels can count ♥</div>
    <div class="yes-saved" id="yes-saved">✦ SAVED TO HEART.EXE ✦</div>
    <div id="yes-gallery"></div>
  </div>
</div>

<!-- NO SCREEN -->
<div id="no-screen">
  <div class="neon-center">
    <div class="neon-big">ANISA,<br>LOVE ME.</div>
    <svg class="neon-heart-svg" viewBox="0 0 100 90" fill="#ffccff">
      <path d="M50 85 L10 45 C-2 30 1 8 18 2 C30 -2 42 5 50 18 C58 5 70 -2 82 2 C99 8 102 30 90 45 Z"/>
    </svg>
    <div class="neon-sub">YOU CANNOT ESCAPE THIS</div>
    <button class="retry-btn" onclick="resetAll()">↩ TRY AGAIN</button>
  </div>
</div>

<script>
// ── LANDSCAPE LOCK ──
(function(){
  try {
    if(screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(()=>{});
    }
  } catch(e) {}
})();

// ── STARS ──
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const d=document.createElement('div');
    d.className='star';
    const sz=Math.random()*2+0.5;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`;
    s.appendChild(d);
  }
})();

// ── FLOATING BACKGROUND PHOTOS ──
(function(){
  const bg=document.getElementById('photo-bg');
  const emojis=['💕','✨','🌸','💗','🎀','💖','🌷','⭐','💝','🌹','💫','🎵'];
  const colors=[
    ['#ff9fb2','#ff3399'],['#ffb3e6','#cc0066'],['#ffd6ec','#ff69b4'],
    ['#ff6699','#990033'],['#ffccff','#ff3399'],['#ffe0f5','#ff1493']
  ];

  // Scattered polaroid photos (rectangular)
  const polData=[
    {top:'5%',left:'2%',rot:'-8deg',e:'💕',label:'together',fdur:'22s',fdel:'0s'},
    {top:'8%',right:'3%',rot:'7deg',e:'🌸',label:'always',fdur:'18s',fdel:'-4s'},
    {top:'55%',left:'1%',rot:'-5deg',e:'✨',label:'magic',fdur:'25s',fdel:'-8s'},
    {top:'70%',right:'2%',rot:'10deg',e:'🎵',label:'our song',fdur:'20s',fdel:'-2s'},
    {top:'30%',left:'0%',rot:'-12deg',e:'💝',label:'forever',fdur:'16s',fdel:'-6s'},
    {top:'42%',right:'1%',rot:'6deg',e:'🌹',label:'rosie',fdur:'28s',fdel:'-10s'},
    {top:'82%',left:'4%',rot:'4deg',e:'💖',label:'love',fdur:'19s',fdel:'-3s'},
    {top:'88%',right:'5%',rot:'-9deg',e:'🎀',label:'pretty',fdur:'23s',fdel:'-7s'},
  ];

  polData.forEach((p,i)=>{
    const c=colors[i%colors.length];
    const div=document.createElement('div');
    div.className='polaroid';
    div.style.cssText=`top:${p.top};${p.right?'right:'+p.right:'left:'+p.left};--rot:${p.rot};--fdur:${p.fdur};--fdel:${p.fdel};width:90px;`;
    div.innerHTML=`<div class="pol-inner" style="--c1:${c[0]};--c2:${c[1]};font-size:26px;">${p.e}</div><div class="pol-label">${p.label}</div>`;
    bg.appendChild(div);
  });

  // Heart-shaped photo frames
  const heartData=[
    {top:'18%',left:'5%',size:100,rot:'-5deg',e:'💗',fdur:'20s',fdel:'-5s'},
    {top:'60%',right:'5%',size:110,rot:'8deg',e:'💕',fdur:'24s',fdel:'-9s'},
    {top:'15%',right:'6%',size:90,rot:'3deg',e:'🌷',fdur:'17s',fdel:'-1s'},
    {top:'75%',left:'6%',size:95,rot:'-10deg',e:'⭐',fdur:'21s',fdel:'-12s'},
  ];

  heartData.forEach(h=>{
    const wrap=document.createElement('div');
    wrap.className='heart-photo-wrap';
    wrap.style.cssText=`top:${h.top};${h.right?'right:'+h.right:'left:'+h.left};--rot:${h.rot};--fdur:${h.fdur};--fdel:${h.fdel};`;
    const c=colors[Math.floor(Math.random()*colors.length)];
    wrap.innerHTML=`
      <svg width="${h.size}" height="${h.size*0.9}" viewBox="0 0 100 90">
        <defs>
          <linearGradient id="hg${h.top.replace('%','')}" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="${c[0]}"/>
            <stop offset="100%" stop-color="${c[1]}"/>
          </linearGradient>
          <clipPath id="hc${h.top.replace('%','')}">
            <path d="M50 85 L10 45 C-2 30 1 8 18 2 C30 -2 42 5 50 18 C58 5 70 -2 82 2 C99 8 102 30 90 45 Z"/>
          </clipPath>
        </defs>
        <path d="M50 85 L10 45 C-2 30 1 8 18 2 C30 -2 42 5 50 18 C58 5 70 -2 82 2 C99 8 102 30 90 45 Z"
              fill="url(#hg${h.top.replace('%','')})" opacity="0.85"/>
        <text x="50" y="52" text-anchor="middle" font-size="28" dominant-baseline="middle">${h.e}</text>
      </svg>`;
    bg.appendChild(wrap);
  });
})();

// ── RAIN ──
const rain=document.getElementById('rain');
function buildRain(){
  rain.innerHTML='';
  const cols=Math.ceil(window.innerWidth/90)+1;
  const words=['LOVE ME','ANISA','♥','SAYANG','ALWAYS','MY HEART'];
  let block='';
  for(let i=0;i<60;i++) block+=words[i%words.length]+'<br>';
  for(let i=0;i<cols;i++){
    const c=document.createElement('div');c.className='rc';
    const m=document.createElement('div');m.className='rm';
    m.innerHTML=block+block;
    c.style.opacity=(Math.random()*0.35+0.15).toFixed(2);
    m.style.animationDelay=(Math.random()*-13)+'s';
    c.appendChild(m);rain.appendChild(c);
  }
}
buildRain();
window.addEventListener('resize',buildRain);

// ── SHAKE ──
function shake(el){
  const kicks=[[5,4],[-5,-4],[5,-4],[-5,4],[3,0],[-3,0],[0,3],[0,-3],[0,0]];
  let i=0;
  const t=setInterval(()=>{if(i>=kicks.length){clearInterval(t);el.style.transform='';return;}
    el.style.transform=`translate(${kicks[i][0]}px,${kicks[i][1]}px)`;i++;},32);
}

// ── TYPEWRITER ──
function typeWrite(el,text,speed,cb){
  el.textContent='';let i=0;
  const t=setInterval(()=>{
    el.textContent+=text[i++];
    if(i>=text.length){clearInterval(t);if(cb)cb();}
  },speed);
}

// ── MUSIC NOTES ──
function spawnNote(){
  const notes=['♩','♪','♫','♬','♡'];
  const n=document.createElement('div');
  n.className='music-note';
  n.textContent=notes[Math.floor(Math.random()*notes.length)];
  n.style.cssText=`left:${10+Math.random()*80}%;bottom:${10+Math.random()*30}%;color:rgba(255,51,153,${0.4+Math.random()*0.4});font-size:${12+Math.random()*14}px;`;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),3100);
}
const noteInterval=setInterval(spawnNote,700);

// ── HEARTS CANVAS ──
let heartsAnim=null;
function startHearts(){
  const c=document.getElementById('hearts-canvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  const hearts=[];
  const colors=['#ff3399','#ff69b4','#ffccff','#ff1493','#ff85c2','#ffffff'];
  for(let i=0;i<60;i++){
    hearts.push({
      x:Math.random()*c.width,y:c.height+Math.random()*300,
      size:8+Math.random()*28,speed:0.8+Math.random()*2.5,
      opacity:0.5+Math.random()*0.5,
      wobble:Math.random()*Math.PI*2,wobbleSpeed:0.015+Math.random()*0.025,
      color:colors[Math.floor(Math.random()*colors.length)],
      spin:Math.random()*0.02-0.01,angle:0
    });
  }
  function drawHeart(ctx,x,y,s){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x,y-s*.55,x+s,y-s*.55,x+s,y);
    ctx.bezierCurveTo(x+s,y+s*.65,x,y+s*1.15,x,y+s*1.4);
    ctx.bezierCurveTo(x,y+s*1.15,x-s,y+s*.65,x-s,y);
    ctx.bezierCurveTo(x-s,y-s*.55,x,y-s*.55,x,y);
    ctx.closePath();
  }
  function loop(){
    ctx.clearRect(0,0,c.width,c.height);
    hearts.forEach(h=>{
      h.y-=h.speed;h.wobble+=h.wobbleSpeed;h.angle+=h.spin;
      h.x+=Math.sin(h.wobble)*1.1;
      if(h.y<-60){h.y=c.height+20;h.x=Math.random()*c.width;}
      ctx.save();
      ctx.globalAlpha=h.opacity;
      ctx.fillStyle=h.color;
      ctx.shadowBlur=20;ctx.shadowColor=h.color;
      ctx.translate(h.x,h.y);ctx.rotate(h.angle);
      drawHeart(ctx,0,0,h.size/2);
      ctx.fill();ctx.restore();
    });
    heartsAnim=requestAnimationFrame(loop);
  }
  loop();
}

const yesGallery=[
  {img:P1,label:'cantiknya 💕',pr:'-3deg',delay:0.3},
  {img:P2,label:'my fav girl 🌸',pr:'2deg',delay:0.5},
  {img:P3,label:'selalu ✨',pr:'-1deg',delay:0.7},
  {img:P4,label:'senyummu 💝',pr:'4deg',delay:0.9},
  {img:P5,label:'my heart 🎀',pr:'-2deg',delay:1.1},
];

function triggerYes(){
  clearInterval(noteInterval);
  const win=document.getElementById('win');
  win.style.transform='scale(1.04)';
  setTimeout(()=>{
    document.getElementById('canvas').style.display='none';
    const ys=document.getElementById('yes-screen');
    ys.style.display='flex';
    startHearts();

    // build gallery
    const gal=document.getElementById('yes-gallery');
    yesGallery.forEach((item,i)=>{
      const p=document.createElement('div');
      p.className='yes-pol';
      p.style.cssText=`--pr:${item.pr};animation-delay:${item.delay}s;`;
      p.innerHTML=`<div class="pol-img"><img src="${item.img}" alt="photo"/></div><div class="pol-caption">${item.label}</div>`;
      gal.appendChild(p);
    });

    setTimeout(()=>typeWrite(document.getElementById('yes-line1'),'i knew it, Anisa.',55,()=>{
      setTimeout(()=>typeWrite(document.getElementById('yes-line2'),'♥ that means everything to me.',70,()=>{
        setTimeout(()=>{
          document.getElementById('yes-romantic').style.display='block';
          setTimeout(()=>{document.getElementById('yes-saved').style.display='block';},600);
        },400);
      }),300);
    }),600);
  },200);
}

// ── NO ──
const win=document.getElementById('win');
const btnNo=document.getElementById('btn-no');
const hpWrap=document.getElementById('hpbar-wrap');
const hpFill=document.getElementById('hpfill');
const status=document.getElementById('status');
let noCount=0;
const noMessages=['are you sure...?','think again 🥺','wrong answer.','last warning.','okay fine then.'];

function triggerNo(){
  noCount++;
  if(noCount===1){hpWrap.style.display='block';}
  const pct=Math.max(0,100-(noCount/5)*100);
  hpFill.style.width=pct+'%';
  if(pct<50) hpFill.style.background='linear-gradient(90deg,#ff6600,#ff0000)';
  if(pct===0) hpFill.style.boxShadow='0 0 14px red';

  if(noCount<=4){
    shake(win);
    status.textContent=noMessages[Math.min(noCount-1,noMessages.length-1)];
    const maxX=Math.min(160,noCount*40);
    const maxY=Math.min(90,noCount*22);
    const rx=(Math.random()-0.5)*2*maxX;
    const ry=(Math.random()-0.5)*2*maxY;
    btnNo.style.transform=`translate(${rx}px,${ry}px)`;
    btnNo.style.transition='transform 0.12s ease';
    btnNo.style.fontSize=Math.max(6,9-noCount)+'px';
    btnNo.style.opacity=Math.max(0.2,1-noCount*0.18);
    if(noCount>=3){
      document.body.style.background='#200015';
      setTimeout(()=>document.body.style.background='#000',100);
    }
  } else {
    clearInterval(noteInterval);
    document.getElementById('canvas').style.display='none';
    buildRain();rain.style.opacity='1';
    document.getElementById('no-screen').style.display='flex';
  }
}

function resetAll(){
  noCount=0;
  rain.style.opacity='0';
  document.getElementById('no-screen').style.display='none';
  document.getElementById('yes-screen').style.display='none';
  document.getElementById('canvas').style.display='flex';
  hpWrap.style.display='none';
  hpFill.style.width='100%';
  hpFill.style.background='linear-gradient(90deg,#ff3399,#ff69b4)';
  status.textContent='';
  btnNo.style.transform='';btnNo.style.opacity='1';btnNo.style.fontSize='9px';
  document.getElementById('yes-line1').textContent='';
  document.getElementById('yes-line2').textContent='';
  document.getElementById('yes-romantic').style.display='none';
  document.getElementById('yes-saved').style.display='none';
  document.getElementById('yes-gallery').innerHTML='';
  if(heartsAnim){cancelAnimationFrame(heartsAnim);heartsAnim=null;}
  win.style.animation='winIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both';
}
